<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Внешняя чёрная окантовка -->
  <circle cx="50" cy="50" r="50" fill="#000"/>
  <!-- Белое кольцо -->
  <circle cx="50" cy="50" r="47" fill="#fff"/>
  <!-- Тёмное кольцо -->
  <circle cx="50" cy="50" r="43" fill="#1a1a1a"/>
  <!-- Внутренний круг (фон) -->
  <circle cx="50" cy="50" r="36" fill="#fff"/>

  <!-- Верхний-левый квадрант: синий -->
  <path d="M50 14 A36 36 0 0 0 14 50 L50 50 Z" fill="#0066b1"/>
  <!-- Нижний-правый квадрант: синий -->
  <path d="M50 86 A36 36 0 0 0 86 50 L50 50 Z" fill="#0066b1"/>
  <!-- Верхний-правый квадрант: белый -->
  <path d="M50 14 A36 36 0 0 1 86 50 L50 50 Z" fill="#fff"/>
  <!-- Нижний-левый квадрант: белый -->
  <path d="M50 86 A36 36 0 0 1 14 50 L50 50 Z" fill="#fff"/>

  <!-- Горизонтальная линия по центру -->
  <line x1="14" y1="50" x2="86" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Вертикальная линия по центру -->
  <line x1="50" y1="14" x2="50" y2="86" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Текст BMW на кольце (верхний) -->
  <defs>
    <path id="topArc" d="M 15,50 A 35,35 0 1,1 85,50"/>
  </defs>
  <text font-family="Arial, sans-serif" font-weight="900" font-size="11" fill="#fff" letter-spacing="3">
    <textPath href="#topArc" startOffset="22%">BMW</textPath>
  </text>
</svg>
